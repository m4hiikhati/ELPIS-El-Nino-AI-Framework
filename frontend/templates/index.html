<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Niño AI Prediction System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🌊 El Niño AI Prediction System</h1>

        <p class="subtitle">
            Predict climate conditions and rainfall impact using Machine Learning
        </p>

        <form action="/predict" method="POST">

            <label for="oni">ONI (Oceanic Niño Index)</label>
            <input
                type="number"
                step="any"
                name="oni"
                id="oni"
                placeholder="Example: 1.5"
                required>

            <label for="rainfall">Monsoon Rainfall</label>
            <input
                type="number"
                step="any"
                name="rainfall"
                id="rainfall"
                placeholder="Example: 900"
                required>

            <label for="departure">Rainfall Departure (%)</label>
            <input
                type="number"
                step="any"
                name="departure"
                id="departure"
                placeholder="Example: -10"
                required>

            <label for="temperature">Average Temperature (°C)</label>
            <input
                type="number"
                step="any"
                name="temperature"
                id="temperature"
                placeholder="Example: 29"
                required>

            <button type="submit">
                Predict
            </button>

        </form>

        {% if prediction %}

        <div class="result">

            <h2>Climate Condition</h2>

            <p class="climate">
                {{ climate }}
            </p>

            <h2>Predicted Rainfall Impact</h2>

            <p class="prediction">
                {{ prediction }}
            </p>

        </div>

        {% endif %}

    </div>

</body>

</html>
