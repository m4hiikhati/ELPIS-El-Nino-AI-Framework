<!DOCTYPE html>

<html>

<head>

<title>
El Niño Impact Prediction
</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<div class="container">

<h1>
🌊 El Niño Impact Prediction System
</h1>


<form action="/predict" method="POST">


<label>
ONI Index
</label>

<input 
type="number"
step="0.01"
name="oni"
required>


<label>
Rainfall (mm)
</label>

<input 
type="number"
step="0.01"
name="rainfall"
required>


<label>
Temperature (°C)
</label>

<input 
type="number"
step="0.01"
name="temperature"
required>


<label>
Humidity (%)
</label>

<input 
type="number"
step="0.01"
name="humidity"
required>



<button type="submit">
Predict Impact
</button>


</form>



{% if prediction %}

<div class="result">

<h2>
Prediction:
</h2>

<p>
{{prediction}}
</p>


</div>

{% endif %}


</div>


</body>

</html>
